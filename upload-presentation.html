<!DOCTYPE html>
<html class="light" lang="en"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>Upload Presentation - ICC PrintHub</title><link rel="icon" href="https://indiacybercafe.com/wp-content/uploads/2026/06/ICC-PrintHub-Icon-logo.png" type="image/png"/><script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/><script id="tailwind-config">tailwind.config={darkMode:"class",theme:{extend:{colors:{"text-primary":"#472825","text-secondary":"#96786F",primary:"#472825",secondary:"#96786F",accent:"#D3AB80","light-cream":"#FDE4BC",background:"#FFF4E2"}}}}</script><style>body{background:linear-gradient(135deg,#FFF4E2 0%,#FDE4BC 100%);min-height:100vh}.upload-area{border:3px dashed #D3AB80;border-radius:20px;padding:48px;text-align:center;cursor:pointer;background:rgba(253,228,188,.3)}.upload-area:hover{border-color:#472825}</style></head><body><header class="sticky top-0 z-50 bg-white shadow-sm"><div class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-4"><button onclick="history.back()" class="p-2 hover:bg-light-cream rounded-lg"><span class="material-symbols-outlined">arrow_back</span></button><div><h1 class="font-bold text-primary">Upload Presentation</h1><p class="text-xs text-secondary">Step 1 of 3</p></div></div></header><main class="max-w-6xl mx-auto px-6 py-8"><div class="grid grid-cols-1 lg:grid-cols-3 gap-8"><div class="lg:col-span-2"><div class="bg-white rounded-2xl p-8 shadow-sm"><div id="uploadArea" class="upload-area" onclick="document.getElementById('fileInput').click()"><span class="material-symbols-outlined text-6xl text-accent block mb-4">slideshow</span><h3 class="text-xl font-bold text-primary mb-2">Upload Presentation</h3><p class="text-sm text-secondary">PPT, PPTX files for printing</p><p class="text-xs text-secondary mt-4">Supported: PPT, PPTX • Max 100MB</p></div><input type="file" id="fileInput" accept=".ppt,.pptx" multiple style="display:none" onchange="handleFileSelect(event)"><div id="filesList" class="mt-8"></div><button onclick="document.getElementById('fileInput').click()" class="mt-6 w-full px-6 py-3 border-2 border-accent text-accent font-medium rounded-lg hover:bg-light-cream"><span class="material-symbols-outlined align-middle">add</span> Add Files</button></div></div><div class="lg:col-span-1"><div class="bg-white rounded-2xl p-6 shadow-sm sticky top-24"><h3 class="text-lg font-bold text-primary mb-4">Order Summary</h3><div class="space-y-3 pb-4 border-b"><div class="flex justify-between text-sm"><span class="text-secondary">Files</span><span class="font-medium text-primary" id="fileCount">0</span></div></div><div class="bg-light-cream rounded-lg p-4 mb-6 mt-6"><div class="text-3xl font-bold text-primary">₹<span id="totalPrice">0</span></div></div><button onclick="continueToSettings()" id="continueBtn" disabled class="w-full px-6 py-3 bg-primary text-white font-medium rounded-lg disabled:opacity-50 mb-3">Continue</button></div></div></div></main><script src="firebase-utils.js"></script><script>let files=[];function handleFileSelect(e){for(let f of e.target.files){const ext=f.name.split('.').pop().toLowerCase();if(!['ppt','pptx'].includes(ext)){alert('Only PPT/PPTX files');continue}files.push({name:f.name,size:f.size,type:f.type,file:f,id:Date.now()+Math.random()})}render();update();e.target.value=''}function render(){document.getElementById('filesList').innerHTML='';files.forEach(f=>{const div=document.createElement('div');div.innerHTML=`<div class="flex justify-between p-3 bg-gray-100 rounded-lg mb-2"><span class="text-sm text-primary">${f.name}</span><button onclick="files=files.filter(x=>x.id!='${f.id}');render();update()" class="text-accent"><span class="material-symbols-outlined text-sm">close</span></button></div>`;document.getElementById('filesList').appendChild(div)})}function update(){document.getElementById('fileCount').textContent=files.length;document.getElementById('totalPrice').textContent=(files.length*100).toFixed(2);document.getElementById('continueBtn').disabled=files.length===0}function continueToSettings(){const filesToUpload=files.map(f=>({name:f.name,type:f.type||'application/octet-stream',size:f.size,file:f.file}));window.globalFileStore=filesToUpload;window.uploadedFilesCache=filesToUpload;console.log('✓ Files stored globally:',filesToUpload.length);const filesMetadata=files.map(f=>({name:f.name,pages:10,size:f.size,type:f.type}));sessionStorage.setItem('uploadFiles',JSON.stringify(filesMetadata));sessionStorage.setItem('uploadCategory','Presentation');console.log('✓ Files stored in sessionStorage:',filesMetadata.length);const fileDataPromises=files.map(f=>new Promise(resolve=>{const reader=new FileReader();reader.onload=e=>{resolve({name:f.name,dataUrl:e.target.result,type:f.type||'application/octet-stream',size:f.size})};reader.readAsArrayBuffer(f.file)}));Promise.all(fileDataPromises).then(fileDataArray=>{sessionStorage.setItem('uploadFilesData',JSON.stringify(fileDataArray.map(fd=>({name:fd.name,type:fd.type,size:fd.size,data:Array.from(new Uint8Array(fd.dataUrl))}))));console.log('✓ File data stored in sessionStorage');location.href='upload-settings.html'})}render();update()</script></body></html>
