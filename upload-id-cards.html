<!DOCTYPE html>
<html class="light" lang="en"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>Upload ID Cards - ICC PrintHub</title><link rel="icon" href="https://indiacybercafe.com/wp-content/uploads/2026/06/ICC-PrintHub-Icon-logo.png" type="image/png"/><script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/><script id="tailwind-config">tailwind.config={darkMode:"class",theme:{extend:{colors:{"text-primary":"#472825","text-secondary":"#96786F",primary:"#472825",secondary:"#96786F",accent:"#D3AB80","light-cream":"#FDE4BC",background:"#FFF4E2"}}}}</script><style>body{background:linear-gradient(135deg,#FFF4E2 0%,#FDE4BC 100%);min-height:100vh}.template-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px}.template-card{background:white;border:2px solid #D3AB80;border-radius:12px;padding:16px;cursor:pointer;text-align:center;transition:all .3s}.template-card:hover{border-color:#472825;transform:translateY(-4px)}</style></head><body><header class="sticky top-0 z-50 bg-white shadow-sm"><div class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-4"><button onclick="history.back()" class="p-2 hover:bg-light-cream rounded-lg"><span class="material-symbols-outlined">arrow_back</span></button><div><h1 class="font-bold text-primary">ID Card Printing</h1><p class="text-xs text-secondary">Step 1 of 3</p></div></div></header><main class="max-w-6xl mx-auto px-6 py-8"><div class="grid grid-cols-1 lg:grid-cols-3 gap-8"><div class="lg:col-span-2"><div class="bg-white rounded-2xl p-8 shadow-sm"><h2 class="text-xl font-bold text-primary mb-6">Select ID Card Template</h2><div class="template-grid"><div class="template-card" onclick="selectTemplate('aadhaar')"><span class="text-3xl mb-2">🇮🇳</span><div class="text-sm font-medium text-primary">Aadhaar</div></div><div class="template-card" onclick="selectTemplate('pan')"><span class="text-3xl mb-2">💳</span><div class="text-sm font-medium text-primary">PAN Card</div></div><div class="template-card" onclick="selectTemplate('voter')"><span class="text-3xl mb-2">🗳️</span><div class="text-sm font-medium text-primary">Voter ID</div></div><div class="template-card" onclick="selectTemplate('driving')"><span class="text-3xl mb-2">🚗</span><div class="text-sm font-medium text-primary">Driving License</div></div></div><div class="bg-light-cream rounded-lg p-6 mt-8"><h3 class="font-bold text-primary mb-3">Upload Requirements:</h3><ul class="text-sm text-secondary space-y-2"><li>✓ High resolution images (300 DPI)</li><li>✓ Front & back side for both sides</li><li>✓ JPG, PNG format</li><li>✓ Max 10MB per file</li></ul></div><input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFileSelect(event)"><div id="uploadedList" class="mt-8"></div><button onclick="document.getElementById('fileInput').click()" class="mt-6 w-full px-6 py-3 border-2 border-accent text-accent font-medium rounded-lg hover:bg-light-cream"><span class="material-symbols-outlined align-middle">upload_file</span> Upload Images</button></div></div><div class="lg:col-span-1"><div class="bg-white rounded-2xl p-6 shadow-sm sticky top-24"><h3 class="text-lg font-bold text-primary mb-4">Order Summary</h3><div class="space-y-3 pb-4 border-b"><div class="flex justify-between text-sm"><span class="text-secondary">Template</span><span class="font-medium text-primary" id="templateDisplay">-</span></div><div class="flex justify-between text-sm"><span class="text-secondary">Quantity</span><span class="font-medium text-primary" id="qtyDisplay">0</span></div></div><div class="bg-light-cream rounded-lg p-4 mb-6 mt-6"><div class="text-3xl font-bold text-primary">₹<span id="totalPrice">0</span></div></div><button onclick="continueToSettings()" id="continueBtn" disabled class="w-full px-6 py-3 bg-primary text-white font-medium rounded-lg disabled:opacity-50 mb-3">Continue</button></div></div></div></main><script src="firebase-utils.js"></script><script>let selectedTemplate='';let uploadedFiles=[];function selectTemplate(t){selectedTemplate=t;document.getElementById('templateDisplay').textContent=t.charAt(0).toUpperCase()+t.slice(1);document.getElementById('fileInput').click()}function handleFileSelect(e){uploadedFiles=[];for(let f of e.target.files){if(!f.type.startsWith('image/')){alert('Only image files');continue}uploadedFiles.push({name:f.name,size:f.size,type:f.type,file:f})}updateSummary()}function updateSummary(){document.getElementById('qtyDisplay').textContent=uploadedFiles.length;document.getElementById('totalPrice').textContent=(uploadedFiles.length*150).toFixed(2);document.getElementById('continueBtn').disabled=uploadedFiles.length===0}function continueToSettings(){const filesToUpload=uploadedFiles.map(f=>({name:f.name,type:f.type||'image/jpeg',size:f.size,file:f.file}));window.globalFileStore=filesToUpload;window.uploadedFilesCache=filesToUpload;console.log('✓ Files stored globally:',filesToUpload.length);const filesMetadata=uploadedFiles.map(f=>({name:f.name,pages:2,size:f.size,type:f.type}));sessionStorage.setItem('uploadFiles',JSON.stringify(filesMetadata));sessionStorage.setItem('uploadCategory','ID Cards');console.log('✓ Files stored in sessionStorage:',filesMetadata.length);const fileDataPromises=uploadedFiles.map(f=>new Promise(resolve=>{const reader=new FileReader();reader.onload=e=>{resolve({name:f.name,dataUrl:e.target.result,type:f.type||'image/jpeg',size:f.size})};reader.readAsArrayBuffer(f.file)}));Promise.all(fileDataPromises).then(fileDataArray=>{sessionStorage.setItem('uploadFilesData',JSON.stringify(fileDataArray.map(fd=>({name:fd.name,type:fd.type,size:fd.size,data:Array.from(new Uint8Array(fd.dataUrl))}))));console.log('✓ File data stored in sessionStorage');location.href='upload-settings.html'})}</script></body></html>
