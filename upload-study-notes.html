<!DOCTYPE html>
<html class="light" lang="en"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>Upload Study Notes - ICC PrintHub</title><link rel="icon" href="https://indiacybercafe.com/wp-content/uploads/2026/06/ICC-PrintHub-Icon-logo.png" type="image/png"/><script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script><script id="tailwind-config">tailwind.config={darkMode:"class",theme:{extend:{colors:{"text-primary":"#472825","text-secondary":"#96786F",primary:"#472825",secondary:"#96786F",accent:"#D3AB80","light-cream":"#FDE4BC",background:"#FFF4E2"}}}}</script><style>body{background:linear-gradient(135deg,#FFF4E2 0%,#FDE4BC 100%);min-height:100vh}.badge{display:inline-block;background:#D3AB80;color:white;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px}.upload-area{border:3px dashed #D3AB80;border-radius:20px;padding:48px;text-align:center;cursor:pointer;background:rgba(253,228,188,.3)}.upload-area:hover{border-color:#472825}</style></head><body><header class="sticky top-0 z-50 bg-white shadow-sm"><div class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-4"><button onclick="history.back()" class="p-2 hover:bg-light-cream rounded-lg"><span class="material-symbols-outlined">arrow_back</span></button><div><h1 class="font-bold text-primary">Study Notes Printing</h1><p class="text-xs text-secondary">Step 1 of 3</p></div></div></header><main class="max-w-6xl mx-auto px-6 py-8"><div class="grid grid-cols-1 lg:grid-cols-3 gap-8"><div class="lg:col-span-2"><div class="bg-white rounded-2xl p-8 shadow-sm"><div id="uploadArea" class="upload-area" onclick="document.getElementById('fileInput').click()"><span class="material-symbols-outlined text-6xl text-accent block mb-4">school</span><h3 class="text-xl font-bold text-primary mb-2">Upload Your Study Notes</h3><p class="text-sm text-secondary">Economy printing for students</p><span class="badge">💰 Best Prices</span><p class="text-xs text-secondary mt-4">Supported: PDF, DOC, DOCX • Max 50MB</p></div><input type="file" id="fileInput" accept=".pdf,.doc,.docx" multiple style="display:none" onchange="handleFileSelect(event)"><div id="filesList" class="mt-8"></div><button onclick="document.getElementById('fileInput').click()" class="mt-6 w-full px-6 py-3 border-2 border-accent text-accent font-medium rounded-lg hover:bg-light-cream"><span class="material-symbols-outlined align-middle">add</span> Add Notes</button></div></div><div class="lg:col-span-1"><div class="bg-white rounded-2xl p-6 shadow-sm sticky top-24"><h3 class="text-lg font-bold text-primary mb-4">Order Summary</h3><div class="space-y-3 pb-4 border-b"><div class="flex justify-between text-sm"><span class="text-secondary">Files</span><span class="font-medium text-primary" id="fileCount">0</span></div><div class="flex justify-between text-sm"><span class="text-secondary">Pages</span><span class="font-medium text-primary" id="pageCount">0</span></div></div><div class="bg-accent/20 rounded-lg p-3 mb-4 mt-4 text-xs text-secondary">✓ Student Friendly Pricing<br/>✓ Double-sided by default<br/>✓ Spiral binding available</div><div class="bg-light-cream rounded-lg p-4 mb-6"><div class="text-3xl font-bold text-primary">₹<span id="totalPrice">0</span></div><div class="text-xs text-secondary mt-2">Economy pricing</div></div><button onclick="continueToSettings()" id="continueBtn" disabled class="w-full px-6 py-3 bg-primary text-white font-medium rounded-lg disabled:opacity-50 mb-3">Continue</button></div></div></div></main><script src="firebase-utils.js"></script><script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';let files=[];async function handleFileSelect(e){for(let f of e.target.files){const ext=f.name.split('.').pop().toLowerCase();if(!['pdf','doc','docx'].includes(ext)){alert('Only PDF, DOC, DOCX files');continue}let pages=1;if(ext==='pdf'){try{const ab=await f.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;pages=pdf.numPages}catch(e){pages=5}}else{pages=10}files.push({name:f.name,size:f.size,type:f.type,file:f,pages:pages,id:Date.now()+Math.random()})}render();update()}function render(){document.getElementById('filesList').innerHTML='';files.forEach(f=>{const div=document.createElement('div');div.innerHTML=`<div class="flex justify-between p-3 bg-gray-100 rounded-lg mb-2"><div><div class="text-sm font-medium text-primary">${f.name}</div><div class="text-xs text-secondary">${f.pages} pages</div></div><button onclick="files=files.filter(x=>x.id!='${f.id}');render();update()" class="text-accent"><span class="material-symbols-outlined text-sm">close</span></button></div>`;document.getElementById('filesList').appendChild(div)})}function update(){const totalPages=files.reduce((s,f)=>s+f.pages,0);document.getElementById('fileCount').textContent=files.length;document.getElementById('pageCount').textContent=totalPages;document.getElementById('totalPrice').textContent=(totalPages*0.30).toFixed(2);document.getElementById('continueBtn').disabled=files.length===0}function continueToSettings(){const filesToUpload=files.map(f=>({name:f.name,type:f.type||'application/octet-stream',size:f.size,file:f.file}));window.globalFileStore=filesToUpload;window.uploadedFilesCache=filesToUpload;console.log('✓ Files stored globally:',filesToUpload.length);const filesMetadata=files.map(f=>({name:f.name,pages:f.pages,size:f.size,type:f.type}));sessionStorage.setItem('uploadFiles',JSON.stringify(filesMetadata));sessionStorage.setItem('uploadCategory','Study Notes');console.log('✓ Files stored in sessionStorage:',filesMetadata.length);const fileDataPromises=files.map(f=>new Promise(resolve=>{const reader=new FileReader();reader.onload=e=>{resolve({name:f.name,dataUrl:e.target.result,type:f.type||'application/octet-stream',size:f.size})};reader.readAsArrayBuffer(f.file)}));Promise.all(fileDataPromises).then(fileDataArray=>{sessionStorage.setItem('uploadFilesData',JSON.stringify(fileDataArray.map(fd=>({name:fd.name,type:fd.type,size:fd.size,data:Array.from(new Uint8Array(fd.dataUrl))}))));console.log('✓ File data stored in sessionStorage');location.href='upload-settings.html'})}render()</script></body></html>
