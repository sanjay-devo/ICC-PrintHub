<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Delivery Address - ICC PrintHub</title>
    <link rel="icon" href="https://indiacybercafe.com/wp-content/uploads/2026/06/ICC-PrintHub-Icon-logo.png" type="image/png"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "text-primary": "#472825",
                        "text-secondary": "#96786F",
                        "primary": "#472825",
                        "secondary": "#96786F",
                        "accent": "#D3AB80",
                        "light-cream": "#FDE4BC",
                        "background": "#FFF4E2",
                    },
                },
            }
        };
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #FFF4E2 0%, #FDE4BC 100%);
            min-height: 100vh;
        }
        
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #D3AB80;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #472825;
            box-shadow: 0 0 0 3px rgba(71, 40, 37, 0.1);
        }
        
        .input-field.error {
            border-color: #ba1a1a;
        }
        
        .error-text {
            font-size: 12px;
            color: #ba1a1a;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="history.back()" class="p-2 hover:bg-light-cream rounded-lg transition">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <div>
                    <h1 class="font-bold text-primary">Delivery Address</h1>
                    <p class="text-xs text-secondary">Step 2 of 3</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Form -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl p-8 shadow-sm">
                    <form id="addressForm" onsubmit="handleSubmit(event)">
                        
                        <!-- Full Name -->
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-primary mb-2">Full Name *</label>
                            <input type="text" id="fullName" class="input-field" placeholder="Your full name" required>
                            <span id="fullNameError" class="error-text"></span>
                        </div>

                        <!-- Mobile Number -->
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-primary mb-2">Mobile Number *</label>
                            <input type="tel" id="mobileNumber" class="input-field" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
                            <span id="mobileError" class="error-text"></span>
                        </div>

                        <!-- Email -->
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-primary mb-2">Email Address</label>
                            <input type="email" id="emailAddress" class="input-field" placeholder="your.email@example.com">
                        </div>

                        <!-- Address Line 1 -->
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-primary mb-2">Address Line 1 *</label>
                            <input type="text" id="addressLine1" class="input-field" placeholder="House no., Building name" required>
                            <span id="address1Error" class="error-text"></span>
                        </div>

                        <!-- Address Line 2 -->
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-primary mb-2">Address Line 2</label>
                            <input type="text" id="addressLine2" class="input-field" placeholder="Road name, Area, Colony">
                        </div>

                        <!-- City -->
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-primary mb-2">City *</label>
                            <input type="text" id="city" class="input-field" placeholder="Your city" required>
                            <span id="cityError" class="error-text"></span>
                        </div>

                        <!-- State -->
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-primary mb-2">State *</label>
                            <input type="text" id="state" class="input-field" placeholder="Your state" required>
                            <span id="stateError" class="error-text"></span>
                        </div>

                        <!-- Pincode -->
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-primary mb-2">Pincode *</label>
                            <input type="text" id="pincode" class="input-field" placeholder="6-digit pincode" pattern="[0-9]{6}" required>
                            <span id="pincodeError" class="error-text"></span>
                        </div>

                        <!-- Delivery Type -->
                        <div class="mb-8">
                            <label class="block text-sm font-bold text-primary mb-3">Delivery Type</label>
                            <label class="flex items-center gap-3 cursor-pointer mb-3">
                                <input type="radio" name="deliveryType" value="standard" checked onchange="updateDeliveryPrice()">
                                <span class="text-sm text-primary">Standard (2-3 business days) - Free</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="radio" name="deliveryType" value="express" onchange="updateDeliveryPrice()">
                                <span class="text-sm text-primary">Express (Next day) - +₹50</span>
                            </label>
                        </div>

                        <!-- Save Address Checkbox -->
                        <label class="flex items-center gap-3 cursor-pointer mb-6">
                            <input type="checkbox" id="saveAddress" checked class="w-4 h-4">
                            <span class="text-sm text-primary">Save address to profile for future orders</span>
                        </label>

                    </form>
                </div>
            </div>

            <!-- Order Summary (Sticky) -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl p-6 shadow-sm sticky top-24">
                    <h3 class="text-lg font-bold text-primary mb-4">Order Summary</h3>
                    
                    <div class="space-y-2 pb-4 border-b border-outline-variant/30 text-sm">
                        <div class="flex justify-between">
                            <span class="text-secondary">Subtotal</span>
                            <span class="font-medium text-primary">₹<span id="subtotal">0</span></span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-secondary">Delivery</span>
                            <span class="font-medium text-primary">₹<span id="delivery">0</span></span>
                        </div>
                    </div>

                    <!-- Tax -->
                    <div class="space-y-2 pb-4 border-b border-outline-variant/30 text-sm mt-4">
                        <div class="flex justify-between">
                            <span class="text-secondary">Tax (18% GST)</span>
                            <span class="font-medium text-primary">₹<span id="tax">0</span></span>
                        </div>
                    </div>

                    <!-- Grand Total -->
                    <div class="bg-light-cream rounded-lg p-4 my-4">
                        <div class="text-xs text-secondary mb-2">Grand Total</div>
                        <div class="text-3xl font-bold text-primary">₹<span id="grandTotal">0</span></div>
                        <div class="text-xs text-secondary mt-2">Estimated delivery by <span id="deliveryDate">--</span></div>
                    </div>

                    <!-- Action Buttons -->
                    <button onclick="submitAddress()" class="w-full px-6 py-3 bg-primary text-white font-medium rounded-lg hover:bg-primary/90 transition mb-3">
                        Place Order
                    </button>
                    <button onclick="history.back()" class="w-full px-6 py-3 border-2 border-accent text-accent font-medium rounded-lg hover:bg-light-cream transition">
                        Back
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script>
        function isLoggedIn() {
            return localStorage.getItem('userUID') !== null;
        }

        function requireLogin() {
            if (!isLoggedIn()) {
                location.href = 'login.html?redirect=upload.html';
                return false;
            }
            return true;
        }

        // Load saved address from localStorage
        function loadSavedAddress() {
            const saved = localStorage.getItem('userAddress');
            if (saved) {
                const addr = JSON.parse(saved);
                document.getElementById('fullName').value = addr.fullName || '';
                document.getElementById('mobileNumber').value = addr.mobileNumber || '';
                document.getElementById('emailAddress').value = addr.emailAddress || '';
                document.getElementById('addressLine1').value = addr.addressLine1 || '';
                document.getElementById('addressLine2').value = addr.addressLine2 || '';
                document.getElementById('city').value = addr.city || '';
                document.getElementById('state').value = addr.state || '';
                document.getElementById('pincode').value = addr.pincode || '';
            }
        }

        // Validate and handle submission
        function handleSubmit(event) {
            event.preventDefault();
        }

        function validateForm() {
            let isValid = true;
            
            // Clear previous errors
            document.querySelectorAll('.error-text').forEach(el => el.textContent = '');
            document.querySelectorAll('.input-field').forEach(el => el.classList.remove('error'));

            // Validate full name
            const fullName = document.getElementById('fullName').value.trim();
            if (!fullName) {
                document.getElementById('fullNameError').textContent = 'Full name is required';
                document.getElementById('fullName').classList.add('error');
                isValid = false;
            }

            // Validate mobile
            const mobile = document.getElementById('mobileNumber').value.trim();
            if (!mobile || !/^[0-9]{10}$/.test(mobile)) {
                document.getElementById('mobileError').textContent = 'Enter valid 10-digit mobile number';
                document.getElementById('mobileNumber').classList.add('error');
                isValid = false;
            }

            // Validate address
            const addr1 = document.getElementById('addressLine1').value.trim();
            if (!addr1) {
                document.getElementById('address1Error').textContent = 'Address is required';
                document.getElementById('addressLine1').classList.add('error');
                isValid = false;
            }

            // Validate city
            const city = document.getElementById('city').value.trim();
            if (!city) {
                document.getElementById('cityError').textContent = 'City is required';
                document.getElementById('city').classList.add('error');
                isValid = false;
            }

            // Validate state
            const state = document.getElementById('state').value.trim();
            if (!state) {
                document.getElementById('stateError').textContent = 'State is required';
                document.getElementById('state').classList.add('error');
                isValid = false;
            }

            // Validate pincode
            const pincode = document.getElementById('pincode').value.trim();
            if (!pincode || !/^[0-9]{6}$/.test(pincode)) {
                document.getElementById('pincodeError').textContent = 'Enter valid 6-digit pincode';
                document.getElementById('pincode').classList.add('error');
                isValid = false;
            }

            return isValid;
        }

        function updateDeliveryPrice() {
            const deliveryType = document.querySelector('input[name="deliveryType"]:checked').value;
            const deliveryCost = deliveryType === 'express' ? 50 : 0;
            document.getElementById('delivery').textContent = deliveryCost.toFixed(2);
            calculateTotals();
            updateDeliveryDate(deliveryType);
        }

        function calculateTotals() {
            const subtotal = parseFloat(document.getElementById('subtotal').textContent);
            const delivery = parseFloat(document.getElementById('delivery').textContent);
            const tax = (subtotal + delivery) * 0.18;
            const grand = subtotal + delivery + tax;

            document.getElementById('tax').textContent = tax.toFixed(2);
            document.getElementById('grandTotal').textContent = grand.toFixed(2);
        }

        function updateDeliveryDate(type) {
            const today = new Date();
            if (type === 'express') {
                today.setDate(today.getDate() + 1);
            } else {
                today.setDate(today.getDate() + 2);
            }
            const dateStr = today.toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' });
            document.getElementById('deliveryDate').textContent = dateStr;
        }

        function submitAddress() {
            if (!validateForm()) {
                alert('Please fill all required fields correctly');
                return;
            }

            const address = {
                fullName: document.getElementById('fullName').value,
                mobileNumber: document.getElementById('mobileNumber').value,
                emailAddress: document.getElementById('emailAddress').value,
                addressLine1: document.getElementById('addressLine1').value,
                addressLine2: document.getElementById('addressLine2').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                pincode: document.getElementById('pincode').value
            };

            // Save address if checked
            if (document.getElementById('saveAddress').checked) {
                localStorage.setItem('userAddress', JSON.stringify(address));
            }

            // Store for order submission
            sessionStorage.setItem('deliveryAddress', JSON.stringify(address));
            sessionStorage.setItem('deliveryType', document.querySelector('input[name="deliveryType"]:checked').value);

            // Go to checkout
            location.href = 'upload-checkout.html';
        }

        // Initialize
        window.addEventListener('load', () => {
            if (!requireLogin()) return;
            
            loadSavedAddress();
            
            // Load order data from sessionStorage
            const uploadFilesData = sessionStorage.getItem('uploadFiles');
            const printSettingsData = sessionStorage.getItem('printSettings');
            const orderAmountData = sessionStorage.getItem('orderAmount');
            
            if (!uploadFilesData || !printSettingsData) {
                // Invalid state - redirect to upload
                location.href = 'upload.html';
                return;
            }
            
            // Load and display the price calculated in settings page
            const amount = parseFloat(orderAmountData) || 0;
            document.getElementById('subtotal').textContent = amount.toFixed(2);
            
            updateDeliveryPrice();
        });
    </script>
</body>
</html>
