<!DOCTYPE html>
<html class="light" lang="en"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/><title>Scan & Print - ICC PrintHub</title><link rel="icon" href="https://indiacybercafe.com/wp-content/uploads/2026/06/ICC-PrintHub-Icon-logo.png" type="image/png"/><script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/><script id="tailwind-config">tailwind.config={darkMode:"class",theme:{extend:{colors:{"text-primary":"#472825","text-secondary":"#96786F",primary:"#472825",secondary:"#96786F",accent:"#D3AB80","light-cream":"#FDE4BC",background:"#FFF4E2"}}}}</script><style>body{background:linear-gradient(135deg,#FFF4E2 0%,#FDE4BC 100%);min-height:100vh}.upload-area{border:3px dashed #D3AB80;border-radius:20px;padding:48px;text-align:center;cursor:pointer;transition:all .3s;background:rgba(253,228,188,.3)}.upload-area:hover{border-color:#472825;background:rgba(211,171,128,.1)}.upload-area.dragover{border-color:#472825;background:rgba(71,40,37,.05);transform:scale(1.02)}</style></head><body><header class="sticky top-0 z-50 bg-white shadow-sm"><div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between"><div class="flex items-center gap-4"><button onclick="history.back()" class="p-2 hover:bg-light-cream rounded-lg transition"><span class="material-symbols-outlined">arrow_back</span></button><div><h1 class="font-bold text-primary">Scan & Print</h1><p class="text-xs text-secondary">Step 1 of 3</p></div></div></div></header><main class="max-w-6xl mx-auto px-6 py-8"><div class="grid grid-cols-1 lg:grid-cols-3 gap-8"><div class="lg:col-span-2"><div class="bg-white rounded-2xl p-8 shadow-sm"><div id="uploadArea" class="upload-area" onclick="launchCamera()"><div class="mb-4"><span class="material-symbols-outlined text-6xl text-accent block mb-4">photo_camera</span></div><h3 class="text-xl font-bold text-primary mb-2">Scan Documents with Camera</h3><p class="text-sm text-secondary">Tap to open your device camera</p><p class="text-xs text-secondary mt-4">Features: Auto crop, edge detection, quality enhancement</p></div><input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleCapture(event)"><input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFileSelect(event)"><div id="scannedList" class="mt-8"></div><button onclick="document.getElementById('fileInput').click()" class="mt-6 w-full px-6 py-3 border-2 border-accent text-accent font-medium rounded-lg hover:bg-light-cream transition"><span class="material-symbols-outlined align-middle text-xl">add_a_photo</span> Upload Images</button></div></div><div class="lg:col-span-1"><div class="bg-white rounded-2xl p-6 shadow-sm sticky top-24"><h3 class="text-lg font-bold text-primary mb-4">Order Summary</h3><div class="space-y-3 pb-4 border-b border-outline-variant/30"><div class="flex justify-between text-sm"><span class="text-secondary">Pages Scanned</span><span class="font-medium text-primary" id="pageCount">0</span></div></div><div class="bg-light-cream rounded-lg p-4 mb-6 mt-6"><div class="text-xs text-secondary mb-2">Estimated Price</div><div class="text-3xl font-bold text-primary">₹<span id="totalPrice">0</span></div></div><button onclick="continueToSettings()" id="continueBtn" disabled class="w-full px-6 py-3 bg-primary text-white font-medium rounded-lg hover:bg-primary/90 transition disabled:opacity-50 disabled:cursor-not-allowed mb-3">Continue</button></div></div></div></main><script src="firebase-utils.js"></script><script>function isLoggedIn(){return localStorage.getItem('userUID')!==null}function requireLogin(){if(!isLoggedIn()){location.href='login.html?redirect=upload.html';return false}return true}let scannedPages=[];function launchCamera(){document.getElementById('cameraInput').click()}function handleCapture(e){handleFiles(e.target.files);e.target.value=''}function handleFileSelect(e){handleFiles(e.target.files);e.target.value=''}function handleFiles(files){for(let file of files){if(!file.type.startsWith('image/')){alert('Only image files supported');continue}const reader=new FileReader();reader.onload=(e)=>{scannedPages.push({name:file.name,dataUrl:e.target.result,id:Date.now()+Math.random()});renderScanned();updateSummary()};reader.readAsDataURL(file)}}function renderScanned(){const list=document.getElementById('scannedList');list.innerHTML='';scannedPages.forEach(p=>{const item=document.createElement('div');item.className='flex items-center justify-between p-3 bg-gray-100 rounded-lg mb-2';item.innerHTML=`<span class="text-sm text-primary">${p.name}</span><button onclick="removePage('${p.id}')" class="p-1 hover:bg-light-cream rounded"><span class="material-symbols-outlined text-accent text-sm">close</span></button>`;list.appendChild(item)})}function removePage(id){scannedPages=scannedPages.filter(p=>p.id!==id);renderScanned();updateSummary()}function updateSummary(){const count=scannedPages.length;document.getElementById('pageCount').textContent=count;const price=count*0.50;document.getElementById('totalPrice').textContent=price.toFixed(2);document.getElementById('continueBtn').disabled=count===0}function continueToSettings(){if(scannedPages.length===0)return;const filesToUpload=scannedPages.map(p=>({name:p.name,type:'image/jpeg',size:p.size||0,file:p.file}));window.globalFileStore=filesToUpload;window.uploadedFilesCache=filesToUpload;console.log('✓ Files stored globally:',filesToUpload.length);const filesMetadata=scannedPages.map(p=>({name:p.name,pages:1,size:p.size||0,type:'image/jpeg'}));sessionStorage.setItem('uploadFiles',JSON.stringify(filesMetadata));sessionStorage.setItem('uploadCategory','Scan & Print');console.log('✓ Files stored in sessionStorage:',filesMetadata.length);const fileDataPromises=scannedPages.map(p=>new Promise(resolve=>{const reader=new FileReader();reader.onload=e=>{resolve({name:p.name,dataUrl:e.target.result,type:'image/jpeg',size:p.size||0})};reader.readAsArrayBuffer(p.file)}));Promise.all(fileDataPromises).then(fileDataArray=>{sessionStorage.setItem('uploadFilesData',JSON.stringify(fileDataArray.map(fd=>({name:fd.name,type:fd.type,size:fd.size,data:Array.from(new Uint8Array(fd.dataUrl))}))));console.log('✓ File data stored in sessionStorage');location.href='upload-settings.html'})}window.addEventListener('load',()=>{if(!requireLogin())return})</script></body></html>
