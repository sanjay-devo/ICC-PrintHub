    <script type="module">
        // ============================================================================
        // FIREBASE PHONE AUTHENTICATION - PRODUCTION READY
        // Real OTP Delivery with Firebase v10 Modular SDK
        // ============================================================================

        // Firebase v10 Modular SDK
        const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js');
        const { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js');
        const { getDatabase, ref, get } = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js');

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAzYEuCjArt628xRVqYY5vWoQNo2p71vfQ",
            authDomain: "icc-printhub.firebaseapp.com",
            databaseURL: "https://icc-printhub-default-rtdb.firebaseio.com",
            projectId: "icc-printhub",
            storageBucket: "icc-printhub.firebasestorage.app",
            messagingSenderId: "656827827016",
            appId: "1:656827827016:web:ba0494906bf9bf7d9d697d"
        };

        // Global State
        let auth = null;
        let database = null;
        let recaptchaVerifier = null;
        let confirmationResult = null;
        let otpResendTimer = null;
        let otpTimeoutTimer = null;
        let isProcessing = false;
        let isResendDisabled = false;

        // DOM Elements Cache (will be populated after DOM is ready)
        const DOM = {};

        // ============================================================================
        // FIREBASE INITIALIZATION
        // ============================================================================
        
        async function initializeFirebase() {
            try {
                console.log('[Firebase Init] Starting Firebase initialization...');
                console.log('[Domain Check] Current domain:', window.location.hostname);

                // Initialize Firebase app
                const app = initializeApp(firebaseConfig);
                console.log('[Firebase Init] Firebase app initialized');

                // Get Auth instance
                auth = getAuth(app);
                console.log('[Firebase Init] Auth instance obtained');

                // Get Database instance
                database = getDatabase(app);
                console.log('[Firebase Init] Database instance obtained');

                // Initialize reCAPTCHA verifier
                await initializeRecaptcha();

                // Check authorized domain
                checkAuthorizedDomain();

                console.log('[Firebase Init] ✅ Firebase initialization complete');
                return true;

            } catch (error) {
                console.error('[Firebase Init] ❌ Initialization failed:', error);
                showError(`Firebase Error: ${error.message}`);
                return false;
            }
        }

        // ============================================================================
        // RECAPTCHA INITIALIZATION (FIREBASE V10 CORRECT SYNTAX)
        // ============================================================================
        
        async function initializeRecaptcha() {
            try {
                console.log('[reCAPTCHA] Initializing invisible reCAPTCHA v3...');

                // Firebase v10 correct syntax: new RecaptchaVerifier(auth, container, options)
                recaptchaVerifier = new RecaptchaVerifier(
                    auth,
                    'recaptcha-container',
                    {
                        size: 'invisible',
                        callback: (token) => {
                            console.log('[reCAPTCHA] ✅ Token received, length:', token.length);
                        },
                        'expired-callback': () => {
                            console.warn('[reCAPTCHA] ⚠️ Token expired');
                            resetRecaptcha();
                        },
                        'error-callback': (error) => {
                            console.error('[reCAPTCHA] ❌ Error:', error);
                            resetRecaptcha();
                        }
                    }
                );

                // Render reCAPTCHA (not verify)
                await recaptchaVerifier.render();
                console.log('[reCAPTCHA] ✅ reCAPTCHA initialized and rendered');

            } catch (error) {
                console.error('[reCAPTCHA] ❌ Initialization error:', error.message);
                
                // Retry after delay
                console.log('[reCAPTCHA] Retrying in 1 second...');
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                try {
                    recaptchaVerifier = new RecaptchaVerifier(
                        auth,
                        'recaptcha-container',
                        {
                            size: 'invisible'
                        }
                    );
                    await recaptchaVerifier.render();
                    console.log('[reCAPTCHA] ✅ Retry successful');
                } catch (retryError) {
                    console.error('[reCAPTCHA] ❌ Retry failed:', retryError.message);
                    throw new Error('reCAPTCHA initialization failed after retry');
                }
            }
        }

        function resetRecaptcha() {
            try {
                if (recaptchaVerifier) {
                    recaptchaVerifier.clear();
                    console.log('[reCAPTCHA] Cleared and will reinitialize on next send');
                    recaptchaVerifier = null;
                }
            } catch (error) {
                console.error('[reCAPTCHA] Error clearing:', error);
            }
        }

        // ============================================================================
        // DOMAIN VALIDATION
        // ============================================================================
        
        function checkAuthorizedDomain() {
            const hostname = window.location.hostname;
            const authorizedDomains = [
                'localhost',
                '127.0.0.1',
                'icc-printhub.firebaseapp.com',
                'iccprinthub.com',
                'localhost:3000',
                'localhost:5000',
                'localhost:8080'
            ];

            const isAuthorized = authorizedDomains.includes(hostname) || 
                                hostname.endsWith('.firebaseapp.com') ||
                                hostname.endsWith('.netlify.app') ||
                                hostname.endsWith('.vercel.app') ||
                                hostname.startsWith('192.168');
            
            console.log(`[Domain] Hostname: ${hostname}`);
            console.log(`[Domain] Authorized: ${isAuthorized}`);

            if (!isAuthorized) {
                console.warn(`[Domain] ⚠️ WARNING: Domain "${hostname}" may not be authorized in Firebase`);
                console.warn('[Domain] Add it to Firebase Console → Authentication → Authorized Domains');
            }
        }

        // ============================================================================
        // SEND OTP
        // ============================================================================
        
        async function sendOTP(phoneNumber) {
            try {
                console.log('[Send OTP] Starting OTP send for:', phoneNumber);

                // Validation
                if (!phoneNumber || !isValidIndianPhone(phoneNumber)) {
                    throw new Error('Invalid phone number format');
                }

                if (!auth) {
                    throw new Error('Firebase not initialized');
                }

                if (!recaptchaVerifier) {
                    console.log('[Send OTP] reCAPTCHA not ready, reinitializing...');
                    await initializeRecaptcha();
                }

                // Rate limiting - prevent duplicate requests
                if (isProcessing) {
                    throw new Error('Please wait for the previous request to complete');
                }

                isProcessing = true;
                showLoading(true);
                DOM.sendOtpBtn.disabled = true;

                console.log('[Send OTP] Calling Firebase signInWithPhoneNumber()...');

                // Send OTP with timeout (60 seconds)
                const result = await Promise.race([
                    signInWithPhoneNumber(auth, phoneNumber, recaptchaVerifier),
                    new Promise((_, reject) => 
                        setTimeout(() => reject(new Error('OTP request timed out (60s)')), 60000)
                    )
                ]);

                confirmationResult = result;
                console.log('[Send OTP] ✅ OTP sent successfully to:', phoneNumber);

                // Start OTP timeout (5 minutes)
                startOtpTimeout(300);

                // Start resend timer (30 seconds)
                startResendTimer(30);

                showSuccess('✅ OTP sent! Check your phone (SMS may take 30-60 seconds)');
                isProcessing = false;
                showLoading(false);
                return true;

            } catch (error) {
                console.error('[Send OTP] ❌ Error:', error.message);
                console.error('[Send OTP] Full error:', error);
                
                isProcessing = false;
                showLoading(false);
                DOM.sendOtpBtn.disabled = false;
                
                // Handle specific Firebase errors
                const errorMsg = getOtpErrorMessage(error);
                showError(errorMsg);
                
                // Reset reCAPTCHA on failure
                resetRecaptcha();
                
                return false;

            }
        }

        // ============================================================================
        // VERIFY OTP
        // ============================================================================
        
        async function verifyOTP(otp) {
            try {
                console.log('[Verify OTP] Starting OTP verification...');

                if (!otp || otp.length !== 6) {
                    throw new Error('Please enter all 6 digits');
                }

                if (!confirmationResult) {
                    throw new Error('OTP session expired. Please request a new OTP.');
                }

                isProcessing = true;
                showLoading(true);
                DOM.verifyOtpBtn.disabled = true;

                console.log('[Verify OTP] Confirming OTP...');
                const result = await confirmationResult.confirm(otp);

                console.log('[Verify OTP] ✅ OTP verified successfully');
                console.log('[Verify OTP] User UID:', result.user.uid);

                // Clear OTP timeout
                if (otpTimeoutTimer) clearTimeout(otpTimeoutTimer);

                // Save to localStorage
                const userUID = result.user.uid;
                const mobile = result.user.phoneNumber;
                
                localStorage.setItem('userUID', userUID);
                localStorage.setItem('mobile', mobile);
                localStorage.setItem('loginTime', new Date().toISOString());

                console.log('[Verify OTP] Saved to localStorage:', { userUID, mobile });

                // Check if user profile exists
                await handlePostLogin(userUID, mobile);

                return true;

            } catch (error) {
                console.error('[Verify OTP] ❌ Error:', error.message);
                
                isProcessing = false;
                showLoading(false);
                DOM.verifyOtpBtn.disabled = false;

                const errorMsg = getVerifyErrorMessage(error);
                showError(errorMsg);

                // Clear OTP inputs
                DOM.otpInputs.forEach(input => input.value = '');
                DOM.otpInputs[0].focus();

                return false;
            }
        }

        // ============================================================================
        // POST LOGIN - CHECK USER PROFILE
        // ============================================================================
        
        async function handlePostLogin(userUID, mobile) {
            try {
                console.log('[Post Login] Checking user profile for UID:', userUID);

                const userRef = ref(database, `users/${userUID}`);
                const snapshot = await get(userRef);

                if (snapshot.exists()) {
                    const userProfile = snapshot.val();
                    console.log('[Post Login] ✅ User profile exists:', userProfile.name);

                    // Save user data
                    localStorage.setItem('userName', userProfile.name || 'User');
                    localStorage.setItem('userEmail', userProfile.email || '');

                    // Check for redirect parameter
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirectTo = urlParams.get('redirect');
                    const finalRedirect = redirectTo || 'index.html';

                    console.log('[Post Login] Redirecting to:', finalRedirect);
                    window.location.href = finalRedirect;

                } else {
                    console.log('[Post Login] No profile found - new user');

                    // New user - redirect to profile setup
                    localStorage.setItem('isNewUser', 'true');
                    localStorage.setItem('userName', '');

                    console.log('[Post Login] Redirecting to profile setup...');
                    window.location.href = 'profile.html';
                }

            } catch (error) {
                console.error('[Post Login] ❌ Error:', error.message);
                showError('Error checking user profile. Redirecting...');

                // Fallback - redirect to profile setup
                setTimeout(() => {
                    // Check for redirect parameter in fallback
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirectTo = urlParams.get('redirect') || 'profile.html';
                    window.location.href = redirectTo;
                }, 2000);
            }
        }

        // ============================================================================
        // OTP COUNTDOWN TIMERS
        // ============================================================================
        
        function startOtpTimeout(seconds) {
            console.log(`[Timer] OTP expires in ${seconds} seconds`);

            let remaining = seconds;
            otpTimeoutTimer = setInterval(() => {
                remaining--;

                if (remaining <= 0) {
                    clearInterval(otpTimeoutTimer);
                    console.log('[Timer] OTP expired');
                    showError('OTP expired. Please request a new one.');
                    resetOtpUI();
                }
            }, 1000);
        }

        function startResendTimer(seconds) {
            isResendDisabled = true;
            DOM.resendOtpBtn.disabled = true;
            let remaining = seconds;

            const updateBtn = () => {
                DOM.resendOtpBtn.textContent = `Resend OTP (${remaining}s)`;
            };

            updateBtn();

            otpResendTimer = setInterval(() => {
                remaining--;
                updateBtn();

                if (remaining <= 0) {
                    clearInterval(otpResendTimer);
                    isResendDisabled = false;
                    DOM.resendOtpBtn.disabled = false;
                    DOM.resendOtpBtn.textContent = 'Resend OTP';
                    console.log('[Timer] Resend enabled');
                }
            }, 1000);
        }

        // ============================================================================
        // PHONE NUMBER VALIDATION & FORMATTING
        // ============================================================================
        
        function isValidIndianPhone(phoneNumber) {
            // Must be +91 followed by 10 digits
            return /^\+91\d{10}$/.test(phoneNumber);
        }

        function formatPhoneNumber(value) {
            // Remove non-digits
            return value.replace(/[^0-9]/g, '').slice(0, 10);
        }

        // ============================================================================
        // OTP INPUT HANDLING (Auto-focus, Backspace, Paste)
        // ============================================================================
        
        function setupOtpInputHandlers() {
            DOM.otpInputs.forEach((input, index) => {
                // Input event - auto-focus to next
                input.addEventListener('input', (e) => {
                    const value = e.target.value.replace(/[^0-9]/g, '');
                    e.target.value = value;

                    if (value && index < DOM.otpInputs.length - 1) {
                        DOM.otpInputs[index + 1].focus();
                    }

                    // Check if all digits entered and enable/disable Verify button
                    const allFilled = DOM.otpInputs.every(inp => inp.value);
                    if (allFilled) {
                        DOM.verifyOtpBtn.disabled = false;
                        console.log('[OTP Input] All digits entered - Verify button enabled');
                    } else {
                        DOM.verifyOtpBtn.disabled = true;
                    }
                });

                // Backspace - move to previous
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        DOM.otpInputs[index - 1].focus();
                    }
                });

                // Enter key to verify OTP
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const allFilled = DOM.otpInputs.every(inp => inp.value);
                        if (allFilled && !DOM.verifyOtpBtn.disabled) {
                            DOM.verifyOtpBtn.click();
                        }
                    }
                });

                // Paste event - auto-distribute digits
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pastedText = (e.clipboardData || window.clipboardData).getData('text');
                    const digits = pastedText.replace(/[^0-9]/g, '').slice(0, 6);

                    console.log('[OTP Paste] Pasted:', digits.length, 'digits');

                    for (let i = 0; i < digits.length && i < DOM.otpInputs.length; i++) {
                        DOM.otpInputs[i].value = digits[i];
                    }

                    // Enable/disable Verify button based on all fields filled
                    const allFilled = DOM.otpInputs.every(inp => inp.value);
                    if (allFilled) {
                        DOM.verifyOtpBtn.disabled = false;
                        console.log('[OTP Paste] All fields filled - Verify button enabled');
                    }

                    // Focus last filled or next empty
                    const nextEmpty = DOM.otpInputs.findIndex(inp => !inp.value);
                    if (nextEmpty !== -1) {
                        DOM.otpInputs[nextEmpty].focus();
                    } else {
                        DOM.otpInputs[DOM.otpInputs.length - 1].focus();
                    }
                });
            });
        }

        // ============================================================================
        // ERROR MESSAGE HANDLERS
        // ============================================================================
        
        function getOtpErrorMessage(error) {
            console.log('[Error Handler] Processing error code:', error.code);

            const errorMap = {
                'auth/invalid-phone-number': 'Invalid phone number. Use Indian format: 10 digits',
                'auth/too-many-requests': 'Too many attempts. Wait 5-10 minutes before trying again.',
                'auth/operation-not-allowed': 'Phone authentication is disabled. Contact support.',
                'auth/app-not-authorized': 'App not authorized for this domain. Check Firebase settings.',
                'auth/network-request-failed': 'Network error. Check your internet connection.',
                'auth/user-disabled': 'This phone number is blocked. Contact support.',
                'auth/internal-error': 'Firebase server error. Try again in a moment.',
                'auth/unsupported-first-factor': 'Phone auth not available in your region.'
            };

            if (error.code in errorMap) {
                return errorMap[error.code];
            }

            // Handle custom error messages
            if (error.message?.includes('Timeout')) {
                return 'Request timed out. Check your internet and try again.';
            }

            if (error.message?.includes('reCAPTCHA')) {
                return 'Security verification failed. Please refresh and try again.';
            }

            if (error.message?.includes('Unauthorized')) {
                return 'Your domain is not authorized. Add it in Firebase Console.';
            }

            return `Error: ${error.message || 'Unknown error. Try again.'}`;
        }

        function getVerifyErrorMessage(error) {
            const errorMap = {
                'auth/invalid-verification-code': 'Invalid OTP. Please check and try again.',
                'auth/expired-action-code': 'OTP expired. Request a new one.',
                'auth/session-expired': 'Session expired. Start over.',
                'auth/network-request-failed': 'Network error. Check your connection.'
            };

            if (error.code in errorMap) {
                return errorMap[error.code];
            }

            if (error.message?.includes('expired')) {
                return 'OTP expired. Please request a new one.';
            }

            return error.message || 'Invalid OTP. Try again.';
        }

        // ============================================================================
        // UI HELPERS
        // ============================================================================
        
        function showError(message) {
            if (!DOM.errorMessage) return;
            DOM.errorMessage.classList.remove('hidden', 'bg-green-100', 'border-green-500', 'text-green-700');
            DOM.errorMessage.classList.add('bg-error-container', 'border-error', 'text-error');
            DOM.errorMessage.querySelector('p').textContent = message;
        }

        function showSuccess(message) {
            if (!DOM.errorMessage) return;
            DOM.errorMessage.classList.remove('hidden', 'bg-error-container', 'border-error', 'text-error');
            DOM.errorMessage.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
            DOM.errorMessage.querySelector('p').textContent = message;
        }

        function clearError() {
            if (!DOM.errorMessage) return;
            DOM.errorMessage.classList.add('hidden');
        }

        function showLoading(show) {
            if (!DOM.loadingState) return;
            DOM.loadingState.classList.toggle('hidden', !show);
        }

        function resetOtpUI() {
            if (!DOM.phoneSection || !DOM.otpSection) return;
            DOM.phoneSection.classList.remove('hidden');
            DOM.otpSection.classList.add('hidden');
            DOM.otpInputs.forEach(input => input.value = '');
            confirmationResult = null;
            isProcessing = false;
            clearInterval(otpResendTimer);
            clearInterval(otpTimeoutTimer);
        }

        // ============================================================================
        // EVENT LISTENERS SETUP
        // ============================================================================
        
        function setupEventListeners() {
            console.log('[Setup] Attaching event listeners...');

            // Phone input formatting
            DOM.phoneInput.addEventListener('input', (e) => {
                e.target.value = formatPhoneNumber(e.target.value);
            });

            // Send OTP button
            DOM.sendOtpBtn.addEventListener('click', async () => {
                const phoneValue = DOM.phoneInput.value.trim();

                if (phoneValue.length !== 10) {
                    showError('Please enter a 10-digit mobile number');
                    return;
                }

                clearError();
                const phoneNumber = `+91${phoneValue}`;
                
                if (await sendOTP(phoneNumber)) {
                    DOM.phoneSection.classList.add('hidden');
                    DOM.otpSection.classList.remove('hidden');
                    DOM.displayPhone.textContent = phoneValue;
                    DOM.otpInputs[0].focus();
                }
            });

            // Verify OTP button
            DOM.verifyOtpBtn.addEventListener('click', async () => {
                const otp = Array.from(DOM.otpInputs).map(input => input.value).join('');
                await verifyOTP(otp);
            });

            // Resend OTP button
            DOM.resendOtpBtn.addEventListener('click', async () => {
                if (isResendDisabled || !confirmationResult) {
                    showError('Please wait before requesting a new OTP');
                    return;
                }

                const phoneValue = DOM.displayPhone.textContent;
                if (await sendOTP(`+91${phoneValue}`)) {
                    DOM.otpInputs.forEach(input => input.value = '');
                    DOM.otpInputs[0].focus();
                    showSuccess('✅ New OTP sent!');
                }
            });

            // Back button
            DOM.backBtn.addEventListener('click', () => {
                resetOtpUI();
                DOM.phoneInput.value = '';
                DOM.phoneInput.focus();
                clearError();
                isProcessing = false;
            });

            // Phone input - Enter key to send OTP
            DOM.phoneInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const phoneValue = DOM.phoneInput.value.trim();
                    if (phoneValue.length === 10) {
                        DOM.sendOtpBtn.click();
                    }
                }
            });

            // OTP verification - Enter key to verify
            document.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !DOM.otpSection.classList.contains('hidden')) {
                    const allFilled = DOM.otpInputs.every(inp => inp.value);
                    if (allFilled && !DOM.verifyOtpBtn.disabled) {
                        DOM.verifyOtpBtn.click();
                    }
                }
            });

            console.log('[Setup] ✅ Event listeners attached');
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================
        
        async function init() {
            try {
                console.log('🚀 [App Init] Starting application...');
                console.log('📱 [App Init] Browser:', navigator.userAgent);
                
                // Wait for DOM to be fully loaded
                if (document.readyState === 'loading') {
                    await new Promise(resolve => document.addEventListener('DOMContentLoaded', resolve));
                }

                // Cache DOM elements
                DOM.phoneInput = document.getElementById('phoneInput');
                DOM.sendOtpBtn = document.getElementById('sendOtpBtn');
                DOM.phoneSection = document.getElementById('phone-section');
                DOM.otpSection = document.getElementById('otp-section');
                DOM.otpInputs = document.querySelectorAll('.otp-input');
                DOM.verifyOtpBtn = document.getElementById('verifyOtpBtn');
                DOM.resendOtpBtn = document.getElementById('resendOtpBtn');
                DOM.backBtn = document.getElementById('backBtn');
                DOM.errorMessage = document.getElementById('errorMessage');
                DOM.loadingState = document.getElementById('loadingState');
                DOM.displayPhone = document.getElementById('displayPhone');

                console.log('[App Init] ✅ DOM elements cached');

                // Setup OTP input handlers
                setupOtpInputHandlers();

                // Initialize Firebase
                const initSuccess = await initializeFirebase();
                
                if (initSuccess) {
                    DOM.sendOtpBtn.disabled = false;
                    console.log('✅ [App Init] Firebase ready, attaching listeners...');
                    
                    // Attach event listeners AFTER Firebase is ready
                    setupEventListeners();
                    
                    console.log('✅ [App Init] Application ready for use');
                } else {
                    showError('Firebase initialization failed. Please refresh the page.');
                    DOM.sendOtpBtn.disabled = true;
                }

            } catch (error) {
                console.error('❌ [App Init] Fatal error:', error);
                showError('Application initialization failed');
                DOM.sendOtpBtn.disabled = true;
            }
        }

        // Start app when document is ready
        console.log('[Bootstrap] Document state:', document.readyState);
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // ============================================================================
        // END OF SCRIPT
        // ============================================================================
    </script>
</body>
</html>
